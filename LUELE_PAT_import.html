function log(msg, cls='log-info'){
  const el = document.getElementById('log');
  el.innerHTML += '<div class="'+cls+'">'+msg+'</div>';
  el.scrollTop = el.scrollHeight;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

window.startImport = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'A importar...';
  document.getElementById('log').innerHTML = '';
  log('A iniciar importacao de '+DOCS.length+' ativos...', 'log-info');
  
  let ok=0, err=0;
  const total = DOCS.length;
  
  for(let i=0; i<DOCS.length; i++){
    const d = DOCS[i];
    try {
      const id = d.equipamentoCod || d.codigo || ('ativo_'+String(i+1).padStart(4,'0'));
      const docData = {
        ...d,
        criadoEm: serverTimestamp(),
        atualizadoEm: serverTimestamp(),
        importado: true
      };
      await setDoc(doc(db, 'ativos', id), docData);
      ok++;
      if(ok % 10 === 0 || ok === total) log('Importados: '+ok+'/'+total+' | Ultimo: '+d.descricao.substring(0,50), 'log-ok');
    } catch(e) {
      err++;
      log('ERRO no registo '+(i+1)+': '+e.message, 'log-err');
    }
    document.getElementById('cnt-ok').textContent = ok;
    document.getElementById('cnt-err').textContent = err;
    document.getElementById('bar').style.width = Math.round((i+1)/total*100)+'%';
    if(i % 5 === 0) await sleep(50); // evitar rate limit
  }
  
  log('', 'log-info');
  if(err===0){
    log('CONCLUIDO! '+ok+' ativos importados com sucesso.', 'log-ok');
    btn.textContent = 'Importacao Concluida!';
    btn.style.background = 'linear-gradient(135deg,#16a34a,#4ade80)';
  } else {
    log('Concluido com '+err+' erros. '+ok+' importados.', 'log-err');
    btn.textContent = 'Concluido com Erros';
    btn.disabled = false;
  }
};
</script>
